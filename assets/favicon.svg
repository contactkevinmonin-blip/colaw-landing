<?xml version="1.0" encoding="UTF-8"?>
<!-- COLAW — favicon (onglet). Pastille chocolat + emblème « Sceau C + Balance »
     en crème. Emblème agrandi (scale 1.42, centré) et traits épaissis pour
     rester lisible à 16 px sur onglet clair ou sombre.
     Grand format (OG, sidebar) : même fichier, la pastille pleine porte. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <defs>
    <linearGradient id="fav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b3835a"/>
      <stop offset="1" stop-color="#8f5d38"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#fav)"/>
  <g transform="translate(16 16) scale(1.42) translate(-12 -12)"
     stroke="#f6f1e6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18.13 6.86A8 8 0 1 0 18.13 17.14" stroke-width="2.9"/>
    <path d="M12 7.6V15.6M9.7 15.6H14.3M8.5 9.5H15.5M8.5 9.5V10.8M15.5 9.5V10.8" stroke-width="1.9"/>
    <path d="M7.2 10.8a1.35 0.95 0 0 0 2.6 0M14.2 10.8a1.35 0.95 0 0 0 2.6 0" stroke-width="1.9"/>
    <rect x="11.05" y="5.7" width="1.9" height="1.9" rx="0.4" transform="rotate(45 12 6.6)" fill="#f6f1e6" stroke="none"/>
  </g>
</svg>
